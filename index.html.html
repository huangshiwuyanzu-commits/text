<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>成绩查询 · 九年级摸底考试</title>
<style>
  :root {
    --primary: #4f46e5;
    --primary-light: #eef2ff;
    --green: #10b981;
    --blue: #3b82f6;
    --amber: #f59e0b;
    --red: #ef4444;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-400: #9ca3af;
    --gray-600: #4b5563;
    --gray-800: #1f2937;
    --radius: 14px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    color: var(--gray-800);
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    padding: 48px 20px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -30px; left: -20px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .header-icon {
    font-size: 36px;
    margin-bottom: 8px;
    display: block;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
  }
  .header p {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    margin-top: 6px;
  }

  /* ===== SEARCH BOX ===== */
  .search-wrap {
    padding: 20px 16px 8px;
  }
  .search-box {
    background: #fff;
    border-radius: var(--radius);
    padding: 18px 16px;
    box-shadow: var(--shadow);
  }
  .search-box h3 {
    font-size: 15px;
    font-weight: 600;
    color: var(--gray-800);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  .input-row input {
    flex: 1;
    height: 46px;
    border: 2px solid var(--gray-200);
    border-radius: 10px;
    padding: 0 14px;
    font-size: 16px;
    color: var(--gray-800);
    outline: none;
    transition: border-color 0.2s;
    background: var(--gray-50);
  }
  .input-row input:focus {
    border-color: var(--primary);
    background: #fff;
  }
  .input-row input::placeholder { color: var(--gray-400); }
  .btn-search {
    height: 46px;
    padding: 0 20px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }
  .btn-search:active { opacity: 0.85; }
  .search-hint {
    font-size: 12px;
    color: var(--gray-400);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ===== NOTICE ===== */
  .notice-wrap {
    padding: 0 16px 12px;
  }
  .notice {
    background: #fffbeb;
    border: 1px solid #fcd34d;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    color: #92400e;
    display: flex;
    gap: 8px;
    align-items: flex-start;
    line-height: 1.6;
  }

  /* ===== RESULT AREA ===== */
  .result-area {
    padding: 0 16px 24px;
  }

  /* Multi-match list */
  .match-list-title {
    font-size: 14px;
    color: var(--gray-600);
    margin-bottom: 10px;
    padding: 0 2px;
  }
  .match-item {
    background: #fff;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .match-item:active { transform: scale(0.98); }
  .match-item-left { display: flex; flex-direction: column; gap: 3px; }
  .match-item-name { font-size: 16px; font-weight: 600; }
  .match-item-meta { font-size: 13px; color: var(--gray-400); }
  .match-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
  .match-item-score { font-size: 18px; font-weight: 700; color: var(--primary); }
  .match-item-school { font-size: 12px; padding: 2px 8px; border-radius: 20px; }

  /* ===== STUDENT CARD ===== */
  .student-card {
    animation: slideUp 0.35s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    color: var(--primary);
    margin-bottom: 14px;
    cursor: pointer;
    font-weight: 500;
    width: fit-content;
  }
  .back-btn:active { opacity: 0.7; }

  /* Top summary card */
  .summary-card {
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    border-radius: var(--radius);
    padding: 22px 18px;
    color: #fff;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  .summary-card::after {
    content: '';
    position: absolute;
    bottom: -20px; right: -20px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
  }
  .summary-name-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 4px;
  }
  .summary-name { font-size: 22px; font-weight: 700; }
  .summary-class { font-size: 14px; opacity: 0.8; }
  .summary-exam-id { font-size: 12px; opacity: 0.65; margin-bottom: 18px; }
  .summary-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .stat-item { text-align: center; }
  .stat-num {
    font-size: 26px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label { font-size: 11px; opacity: 0.75; }

  /* Admission badge */
  .admission-card {
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 14px;
    border: 2px solid;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .admission-icon { font-size: 32px; flex-shrink: 0; }
  .admission-school { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
  .admission-desc { font-size: 13px; opacity: 0.85; line-height: 1.5; }

  /* Gap tip */
  .gap-tip {
    background: #fff7ed;
    border: 1.5px solid #fed7aa;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 14px;
    font-size: 13.5px;
    color: #9a3412;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    line-height: 1.6;
  }

  /* Section title */
  .section-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--gray-800);
    margin: 20px 0 12px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gray-200);
    margin-left: 6px;
  }

  /* Strengths/weaknesses chips */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 6px;
  }
  .chip {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
  }
  .chip-green { background: #d1fae5; color: #065f46; }
  .chip-red { background: #fee2e2; color: #991b1b; }

  /* Subject cards */
  .subject-card {
    background: #fff;
    border-radius: var(--radius);
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .subject-header {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .subject-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    margin-right: 12px;
  }
  .subject-main { flex: 1; min-width: 0; }
  .subject-name-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .subject-name { font-size: 15px; font-weight: 600; }
  .subject-level {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
  }
  .progress-wrap {
    height: 6px;
    background: var(--gray-100);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    border-radius: 3px;
    transition: width 0.8s ease;
  }
  .subject-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    margin-left: 14px;
    flex-shrink: 0;
  }
  .subject-score {
    font-size: 22px;
    font-weight: 800;
    line-height: 1;
  }
  .subject-max { font-size: 11px; color: var(--gray-400); margin-bottom: 4px; }
  .subject-rank { font-size: 12px; color: var(--gray-400); }
  .expand-arrow {
    font-size: 12px;
    color: var(--gray-400);
    margin-left: 10px;
    transition: transform 0.25s;
    flex-shrink: 0;
  }
  .expand-arrow.open { transform: rotate(180deg); }

  /* Subject detail */
  .subject-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .subject-detail.open { max-height: 600px; }
  .subject-detail-inner {
    padding: 0 16px 16px;
    border-top: 1px solid var(--gray-100);
  }

  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin: 12px 0 14px;
  }
  .meta-item {
    background: var(--gray-50);
    border-radius: 8px;
    padding: 10px 8px;
    text-align: center;
  }
  .meta-val { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
  .meta-lbl { font-size: 11px; color: var(--gray-400); }

  .advice-box {
    background: #f0f9ff;
    border: 1.5px solid #bae6fd;
    border-radius: 10px;
    padding: 12px 14px;
  }
  .advice-title {
    font-size: 13px;
    font-weight: 600;
    color: #0369a1;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .advice-list { list-style: none; }
  .advice-list li {
    font-size: 13px;
    color: #0c4a6e;
    line-height: 1.65;
    padding: 5px 0 5px 18px;
    position: relative;
    border-bottom: 1px solid #e0f2fe;
  }
  .advice-list li:last-child { border-bottom: none; padding-bottom: 2px; }
  .advice-list li::before {
    content: '▶';
    position: absolute;
    left: 0;
    font-size: 9px;
    top: 8px;
    color: #38bdf8;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--gray-400);
    animation: slideUp 0.3s ease;
  }
  .empty-icon { font-size: 52px; margin-bottom: 14px; }
  .empty-msg { font-size: 16px; margin-bottom: 8px; }
  .empty-sub { font-size: 13px; line-height: 1.7; }

  /* Initial state */
  .init-state {
    text-align: center;
    padding: 40px 20px 20px;
    color: var(--gray-400);
  }
  .init-icon { font-size: 64px; margin-bottom: 16px; }
  .init-title { font-size: 16px; font-weight: 600; color: var(--gray-600); margin-bottom: 8px; }
  .init-sub { font-size: 13px; line-height: 1.8; }
  .score-rules {
    margin: 16px auto 0;
    max-width: 300px;
    background: #fff;
    border-radius: 12px;
    padding: 14px 16px;
    box-shadow: var(--shadow);
    text-align: left;
  }
  .score-rules-title { font-size: 13px; font-weight: 600; color: var(--gray-600); margin-bottom: 10px; }
  .score-rule-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    font-size: 13px;
    border-bottom: 1px solid var(--gray-100);
  }
  .score-rule-item:last-child { border-bottom: none; }
  .rule-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .footer {
    text-align: center;
    padding: 16px;
    font-size: 12px;
    color: var(--gray-400);
  }
</style>
</head>

</div>

// Subject icons
const SUBJECT_ICONS = {
  '语文': { icon: '📖', color: '#fef3c7', bar: '#f59e0b' },
  '数学': { icon: '📐', color: '#ede9fe', bar: '#8b5cf6' },
  '英语': { icon: '🌐', color: '#dbeafe', bar: '#3b82f6' },
  '道德与法治': { icon: '⚖️', color: '#fce7f3', bar: '#ec4899' },
  '历史': { icon: '🏛️', color: '#f3f4f6', bar: '#6b7280' },
  '物理': { icon: '⚡', color: '#fef9c3', bar: '#eab308' },
  '化学': { icon: '🧪', color: '#dcfce7', bar: '#22c55e' }
};

function doSearch() {
  const name = document.getElementById('nameInput').value.trim();
  const id = document.getElementById('idInput').value.trim();
  
  if (!name && !id) {
    showEmpty('请输入姓名或考号', '两项至少填写一项');
    return;
  }
  
  let results = [];
  if (id) {
    results = STUDENTS.filter(s => s.exam_id === id);
  }
  if (results.length === 0 && name) {
    results = STUDENTS.filter(s => s.name.includes(name) || name.includes(s.name));
  }
  
  if (results.length === 0) {
    showEmpty('未找到该学生', '请核对姓名或考号是否正确<br>如有疑问请联系班主任');
    return;
  }
  
  if (results.length === 1) {
    renderStudent(results[0]);
    return;
  }
  
  renderMatchList(results);
}

function renderMatchList(list) {
  const area = document.getElementById('resultArea');
  let html = `<p class="match-list-title">找到 ${list.length} 位同学，请选择：</p>`;
  list.forEach((s, i) => {
    const adm = s.admission;
    html += `
      <div class="match-item" onclick="renderStudent(STUDENTS.find(x=>x.exam_id==='${s.exam_id}'))">
        <div class="match-item-left">
          <div class="match-item-name">${s.name}</div>
          <div class="match-item-meta">${s.class} · 考号：${s.exam_id}</div>
        </div>
        <div class="match-item-right">
          <div class="match-item-score">${s.total}分</div>
          <div class="match-item-school" style="background:${adm.bg};color:${adm.color}">${adm.school}</div>
        </div>
      </div>`;
  });
  area.innerHTML = html;
  area.scrollIntoView({behavior:'smooth', block:'start'});
}

function renderStudent(s) {
  if (!s) return;
  const adm = s.admission;
  const area = document.getElementById('resultArea');
  
  // Strengths & weaknesses chips
  let strengthHtml = s.strengths.length > 0
    ? s.strengths.map(x => `<span class="chip chip-green">✅ ${x}</span>`).join('')
    : '<span style="font-size:13px;color:#9ca3af">暂无明显优势科目</span>';
  let weaknessHtml = s.weaknesses.length > 0
    ? s.weaknesses.map(x => `<span class="chip chip-red">⚠️ ${x}</span>`).join('')
    : '<span style="font-size:13px;color:#9ca3af">无明显薄弱科目</span>';
  
  // Gap tip
  let gapHtml = '';
  if (s.gap_to_tier) {
    const g = s.gap_to_tier;
    gapHtml = `<div class="gap-tip">🎯 距<strong>${g.target}</strong>还差 <strong>${g.gap} 分</strong>，加油冲刺！</div>`;
  }
  
  // Subject cards
  let subjectsHtml = '';
  s.subjects.forEach((sub, i) => {
    const info = SUBJECT_ICONS[sub.name] || { icon: '📚', color: '#f3f4f6', bar: '#6b7280' };
    const diffStr = sub.diff >= 0 ? `+${sub.diff}` : `${sub.diff}`;
    const diffColor = sub.diff >= 0 ? '#10b981' : '#ef4444';
    const levelStyle = `background:${sub.level.color}22;color:${sub.level.color}`;
    
    let adviceHtml = sub.advice.map(a => `<li>${a}</li>`).join('');
    
    subjectsHtml += `
    <div class="subject-card" id="sub_${i}">
      <div class="subject-header" onclick="toggleSubject(${i})">
        <div class="subject-icon" style="background:${info.color}">${info.icon}</div>
        <div class="subject-main">
          <div class="subject-name-row">
            <span class="subject-name">${sub.name}</span>
            <span class="subject-level" style="${levelStyle}">${sub.level.label}</span>
          </div>
          <div class="progress-wrap">
            <div class="progress-bar" style="width:${sub.pct}%;background:${info.bar}" id="bar_${i}"></div>
          </div>
        </div>
        <div class="subject-right">
          <div class="subject-score" style="color:${info.bar}">${sub.score}</div>
          <div class="subject-max">满分${sub.max}</div>
          <div class="subject-rank">年级第${sub.grade_rank}名</div>
        </div>
        <span class="expand-arrow" id="arrow_${i}">▼</span>
      </div>
      <div class="subject-detail" id="detail_${i}">
        <div class="subject-detail-inner">
          <div class="meta-grid">
            <div class="meta-item">
              <div class="meta-val">${sub.score}</div>
              <div class="meta-lbl">得分</div>
            </div>
            <div class="meta-item">
              <div class="meta-val">${sub.grade_avg}</div>
              <div class="meta-lbl">年级均分</div>
            </div>
            <div class="meta-item">
              <div class="meta-val" style="color:${diffColor}">${diffStr}</div>
              <div class="meta-lbl">超过/低于均分</div>
            </div>
          </div>
          <div class="advice-box">
            <div class="advice-title">📌 ${sub.name}提升建议</div>
            <ul class="advice-list">${adviceHtml}</ul>
          </div>
        </div>
      </div>
    </div>`;
  });
  
  area.innerHTML = `
    <div class="student-card">
      <div class="back-btn" onclick="goBack()">← 重新查询</div>
      
      <div class="summary-card">
        <div class="summary-name-row">
          <span class="summary-name">${s.name}</span>
          <span class="summary-class">${s.class}</span>
        </div>
        <div class="summary-exam-id">考号：${s.exam_id}</div>
        <div class="summary-stats">
          <div class="stat-item">
            <div class="stat-num">${s.total}</div>
            <div class="stat-label">总分</div>
          </div>
          <div class="stat-item">
            <div class="stat-num">第${s.grade_rank}名</div>
            <div class="stat-label">年级排名</div>
          </div>
          <div class="stat-item">
            <div class="stat-num">第${s.class_rank}名</div>
            <div class="stat-label">班级排名</div>
          </div>
        </div>
      </div>

      <div class="admission-card" style="background:${adm.bg};border-color:${adm.border};color:${adm.color}">
        <div class="admission-icon">${adm.icon}</div>
        <div>
          <div class="admission-school">${adm.school}</div>
          <div class="admission-desc">${adm.desc}</div>
        </div>
      </div>
      
      ${gapHtml}

      <div class="section-title">✨ 学科优劣势</div>
      ${s.strengths.length > 0 ? '<p style="font-size:12px;color:#6b7280;margin-bottom:6px">优势科目（年级前30%）</p>' : ''}
      <div class="chips">${strengthHtml}</div>
      ${s.weaknesses.length > 0 ? '<p style="font-size:12px;color:#6b7280;margin:8px 0 6px">薄弱科目（年级后30%）</p>' : ''}
      <div class="chips">${weaknessHtml}</div>

      <div class="section-title">📚 各科成绩与提升建议</div>
      <p style="font-size:12px;color:#9ca3af;margin-bottom:10px">点击任意科目展开详细建议 ▼</p>
      ${subjectsHtml}
    </div>`;
  
  area.scrollIntoView({behavior:'smooth', block:'start'});
}

function toggleSubject(i) {
  const detail = document.getElementById(`detail_${i}`);
  const arrow = document.getElementById(`arrow_${i}`);
  const isOpen = detail.classList.contains('open');
  detail.classList.toggle('open', !isOpen);
  arrow.classList.toggle('open', !isOpen);
}

function goBack() {
  document.getElementById('resultArea').innerHTML = `
    <div class="init-state">
      <div class="init-icon">🎓</div>
      <div class="init-title">查询本次考试成绩</div>
      <div class="init-sub">输入孩子的姓名或考号<br>查看详细成绩与科目提升建议</div>
    </div>`;
  document.getElementById('nameInput').value = '';
  document.getElementById('idInput').value = '';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function showEmpty(msg, sub) {
  document.getElementById('resultArea').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-msg">${msg}</div>
      <div class="empty-sub">${sub}</div>
    </div>`;
}

// Enter key support
document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
document.getElementById('idInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
</script>
